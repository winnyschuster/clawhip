name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64, gajae-layofflabs-2]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Ensure native build tools
        run: |
          set -euo pipefail

          missing=()
          for tool in cc make xz; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing+=("$tool")
            fi
          done

          if (( ${#missing[@]} == 0 )); then
            echo "Native build tools already available"
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "::error::Missing required native build tools (${missing[*]}) and apt-get is unavailable. Install build-essential and xz-utils on the self-hosted runner."
            exit 1
          fi

          if [[ "$(id -u)" == "0" ]]; then
            apt_get=(apt-get)
          elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            apt_get=(sudo apt-get)
          else
            echo "::error::Missing required native build tools (${missing[*]}) and apt-get cannot run with root privileges. Install build-essential and xz-utils on the self-hosted runner or configure passwordless sudo."
            exit 1
          fi

          "${apt_get[@]}" update
          "${apt_get[@]}" install -y --no-install-recommends build-essential xz-utils

          for tool in cc make xz; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Required tool '$tool' is still missing after apt install."
              exit 1
            fi
          done
      - run: cargo check

  test:
    name: Test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64, gajae-layofflabs-2]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Ensure native build tools
        run: |
          set -euo pipefail

          missing=()
          for tool in cc make xz; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing+=("$tool")
            fi
          done

          if (( ${#missing[@]} == 0 )); then
            echo "Native build tools already available"
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "::error::Missing required native build tools (${missing[*]}) and apt-get is unavailable. Install build-essential and xz-utils on the self-hosted runner."
            exit 1
          fi

          if [[ "$(id -u)" == "0" ]]; then
            apt_get=(apt-get)
          elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            apt_get=(sudo apt-get)
          else
            echo "::error::Missing required native build tools (${missing[*]}) and apt-get cannot run with root privileges. Install build-essential and xz-utils on the self-hosted runner or configure passwordless sudo."
            exit 1
          fi

          "${apt_get[@]}" update
          "${apt_get[@]}" install -y --no-install-recommends build-essential xz-utils

          for tool in cc make xz; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Required tool '$tool' is still missing after apt install."
              exit 1
            fi
          done
      - run: cargo test

  clippy:
    name: Clippy
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64, gajae-layofflabs-2]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Ensure native build tools
        run: |
          set -euo pipefail

          missing=()
          for tool in cc make xz; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing+=("$tool")
            fi
          done

          if (( ${#missing[@]} == 0 )); then
            echo "Native build tools already available"
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "::error::Missing required native build tools (${missing[*]}) and apt-get is unavailable. Install build-essential and xz-utils on the self-hosted runner."
            exit 1
          fi

          if [[ "$(id -u)" == "0" ]]; then
            apt_get=(apt-get)
          elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            apt_get=(sudo apt-get)
          else
            echo "::error::Missing required native build tools (${missing[*]}) and apt-get cannot run with root privileges. Install build-essential and xz-utils on the self-hosted runner or configure passwordless sudo."
            exit 1
          fi

          "${apt_get[@]}" update
          "${apt_get[@]}" install -y --no-install-recommends build-essential xz-utils

          for tool in cc make xz; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Required tool '$tool' is still missing after apt install."
              exit 1
            fi
          done
      - run: cargo clippy -- -D warnings

  fmt:
    name: Format
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64, gajae-layofflabs-2]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Ensure native build tools
        run: |
          set -euo pipefail

          missing=()
          for tool in cc make xz; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing+=("$tool")
            fi
          done

          if (( ${#missing[@]} == 0 )); then
            echo "Native build tools already available"
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "::error::Missing required native build tools (${missing[*]}) and apt-get is unavailable. Install build-essential and xz-utils on the self-hosted runner."
            exit 1
          fi

          if [[ "$(id -u)" == "0" ]]; then
            apt_get=(apt-get)
          elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            apt_get=(sudo apt-get)
          else
            echo "::error::Missing required native build tools (${missing[*]}) and apt-get cannot run with root privileges. Install build-essential and xz-utils on the self-hosted runner or configure passwordless sudo."
            exit 1
          fi

          "${apt_get[@]}" update
          "${apt_get[@]}" install -y --no-install-recommends build-essential xz-utils

          for tool in cc make xz; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Required tool '$tool' is still missing after apt install."
              exit 1
            fi
          done
      - run: cargo fmt --all -- --check

  build:
    name: Build
    needs: [check, test, clippy, fmt]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64, gajae-layofflabs-2]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Ensure native build tools
        run: |
          set -euo pipefail

          missing=()
          for tool in cc make xz; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing+=("$tool")
            fi
          done

          if (( ${#missing[@]} == 0 )); then
            echo "Native build tools already available"
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "::error::Missing required native build tools (${missing[*]}) and apt-get is unavailable. Install build-essential and xz-utils on the self-hosted runner."
            exit 1
          fi

          if [[ "$(id -u)" == "0" ]]; then
            apt_get=(apt-get)
          elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            apt_get=(sudo apt-get)
          else
            echo "::error::Missing required native build tools (${missing[*]}) and apt-get cannot run with root privileges. Install build-essential and xz-utils on the self-hosted runner or configure passwordless sudo."
            exit 1
          fi

          "${apt_get[@]}" update
          "${apt_get[@]}" install -y --no-install-recommends build-essential xz-utils

          for tool in cc make xz; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Required tool '$tool' is still missing after apt install."
              exit 1
            fi
          done
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: clawhip-linux-x86_64
          path: target/release/clawhip
